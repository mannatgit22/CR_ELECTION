<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Result PDF Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .download-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .download-link:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Result PDF Downloader</h1>
        <p class="subtitle">Download your semester results instantly</p>
        
        <form id="downloadForm">
            <div class="input-group">
                <label for="sic">Enter SIC Number</label>
                <input 
                    type="text" 
                    id="sic" 
                    name="sic" 
                    placeholder="e.g., 23BECF95" 
                    maxlength="8"
                    required
                    autocomplete="off"
                >
                <p class="hint">Enter 8-character SIC (without SITBBS prefix)</p>
            </div>
            
            <button type="submit" id="submitBtn">Download PDF</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Downloading your result...</p>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');
        const sicInput = document.getElementById('sic');

        // Auto-uppercase input
        sicInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const sic = sicInput.value.trim();
            
            if (sic.length !== 8) {
                showMessage('SIC must be exactly 8 characters', 'error');
                return;
            }

            // Show loading
            submitBtn.disabled = true;
            loading.style.display = 'block';
            message.style.display = 'none';

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ sic: sic })
                });

                const data = await response.json();

                if (response.ok) {
                    message.innerHTML = '';
                    
                    // Create success message with CGPA
                    const successText = document.createElement('p');
                    successText.style.marginBottom = '15px';
                    successText.style.fontSize = '16px';
                    successText.textContent = '✅ PDF downloaded successfully!';
                    message.appendChild(successText);
                    
                    // Display CGPA prominently
                    if (data.cgpa && data.cgpa !== 'Not found') {
                        const cgpaDisplay = document.createElement('div');
                        cgpaDisplay.style.cssText = `
                            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                            color: white;
                            padding: 20px;
                            border-radius: 12px;
                            margin: 15px 0;
                            text-align: center;
                            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
                        `;
                        cgpaDisplay.innerHTML = `
                            <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">CGPA</div>
                            <div style="font-size: 36px; font-weight: 700; letter-spacing: 2px;">${data.cgpa}</div>
                            <div style="font-size: 12px; opacity: 0.8; margin-top: 5px;">SIC: ${data.sic}</div>
                        `;
                        message.appendChild(cgpaDisplay);
                    } else {
                        const noCgpa = document.createElement('p');
                        noCgpa.style.cssText = 'color: #ff9800; font-size: 14px; margin: 10px 0;';
                        noCgpa.textContent = '⚠️ CGPA not found in PDF';
                        message.appendChild(noCgpa);
                    }
                    
                    // Create download link
                    const downloadLink = document.createElement('a');
                    downloadLink.href = `/downloads/${data.pdf}`;
                    downloadLink.className = 'download-link';
                    downloadLink.textContent = '📥 Click here to view/download your PDF';
                    downloadLink.target = '_blank';
                    message.appendChild(downloadLink);
                    
                    message.className = 'message success';
                    message.style.display = 'block';
                } else {
                    showMessage(data.error || 'Failed to download PDF', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }
    </script>
</body>
</html>
